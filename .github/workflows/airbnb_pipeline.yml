name: Toronto Airbnb ETL Pipeline

on:
  #push:
    #branches: [ main ]  # Automatically run on every push
  workflow_dispatch:    # Allows you to run it manually from the GitHub UI

jobs:
  # STEP 1: Ingest data from S3 (Python)
  ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        
        run: pip install boto3 python-dotenv requests pandas

      - name: Run S3 Ingestion
        run: python scripts/01_load_toronto_airbnb_s3.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'ca-central-1'

# STEP 2: Transform Bronze and Silver (SQL)
  sql_transformations:
    needs: ingestion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Snowflake Connector
        run: pip install snowflake-connector-python

      - name: Execute SQL Transformations
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python -c "
          import snowflake.connector
          import os

          # Connect using the variables defined in the 'env' section above
          ctx = snowflake.connector.connect(
              user=os.getenv('SNOWFLAKE_USER'),
              password=os.getenv('SNOWFLAKE_PASSWORD'),
              account=os.getenv('SNOWFLAKE_ACCOUNT'),
              role='SYSADMIN',
              warehouse='COMPUTE_WH'
          )
          
          def run_sql(file_path):
              print(f'Executing {file_path}...')
              with open(file_path, 'r') as f:
                  # Split by semicolon to run each statement individually
                  for query in f.read().split(';'):
                      if query.strip():
                          ctx.cursor().execute(query)

          run_sql('scripts/02_bronze_ingestion.sql')
          run_sql('scripts/03_silver_transformation.sql')
          ctx.close()
          "

  # STEP 3: Generate Gold Sentiment (Snowpark Python)
  gold_sentiment:
    needs: sql_transformations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Snowpark and AI Libs
        run: pip install snowflake-snowpark-python[pandas] vaderSentiment langdetect python-dotenv

      - name: Run Gold Sentiment Analysis
        run: python scripts/04_gold_sentiment_BI.py
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: SYSADMIN
          SNOWFLAKE_DATABASE: AIRBNB_PROJECT
